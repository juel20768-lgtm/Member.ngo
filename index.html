<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন | রেজিস্ট্রেশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
        
        <div id="loginSection">
            <h2 class="text-2xl font-bold mb-1 text-slate-800">স্বাগতম! 👋</h2>
            <p class="text-slate-400 text-sm mb-6">আপনার অ্যাকাউন্টে লগইন করুন</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="lEmail" placeholder="ইমেইল অ্যাড্রেস" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500" required>
                <input type="password" id="lPass" placeholder="পাসওয়ার্ড" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500" required>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-2xl hover:bg-indigo-700 transition">লগইন করুন</button>
            </form>
            <div class="mt-6 text-center">
                <button onclick="showSection('registerSection')" class="text-indigo-600 font-semibold text-sm">নতুন অ্যাকাউন্ট খুলুন</button>
                <button onclick="showSection('resetSection')" class="block mt-2 text-slate-400 text-xs">পাসওয়ার্ড ভুলে গেছেন?</button>
            </div>
        </div>

        <div id="registerSection" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">রেজিস্ট্রেশন</h2>
            <form id="regForm" class="space-y-4">
                <input type="text" id="rName" placeholder="পুরো নাম" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-emerald-500" required>
                <input type="email" id="rEmail" placeholder="ইমেইল" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-emerald-500" required>
                <input type="password" id="rPass" placeholder="পাসওয়ার্ড" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-emerald-500" required>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-2xl hover:bg-emerald-700 transition">নিশ্চিত করুন</button>
            </form>
            <button onclick="showSection('loginSection')" class="w-full mt-6 text-sm text-slate-400">লগইন পেজে ফিরে যান</button>
        </div>

        <div id="resetSection" class="hidden">
            <h2 class="text-2xl font-bold mb-1 text-slate-800">পাসওয়ার্ড রিসেট</h2>
            <form id="resetForm" class="space-y-4">
                <input type="email" id="reEmail" placeholder="আপনার রেজিস্টার্ড ইমেইল" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-rose-500" required>
                <button type="submit" class="w-full bg-rose-500 text-white font-bold py-3 rounded-2xl hover:bg-rose-600 transition">লিঙ্ক পাঠান</button>
            </form>
            <button onclick="showSection('loginSection')" class="w-full mt-6 text-sm text-slate-400">লগইন পেজে ফিরে যান</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // সেকশন পরিবর্তন করার ফাংশন
        window.showSection = (id) => {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('resetSection').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };

        // ১. নতুন মেম্বার রেজিস্ট্রেশন লজিক
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('rName').value.trim();
            const email = document.getElementById('rEmail').value.trim();
            const password = document.getElementById('rPass').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                // ফায়ারস্টোরে কাস্টমার ডাটা সেট করা
                await setDoc(doc(db, "users", cred.user.uid), { 
                    name: name, 
                    email: email, 
                    role: "customer", 
                    status: "pending", 
                    totalDeposit: 0,
                    totalProfitShare: 0
                });
                alert("সফলভাবে রেজিস্ট্রেশন সম্পন্ন! অ্যাডমিন অনুমোদন করলে আপনি ঢুকতে পারবেন।");
                window.location.reload();
            } catch (err) { alert("রেজিস্ট্রেশন ব্যর্থ: " + err.message); }
        });

        // ২. লগইন লজিক (নিরাপদ রিডাইরেকশন এবং সেফটি নেটসহ ফিক্সড)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('lEmail').value.trim();
            const password = document.getElementById('lPass').value;
            
            try {
                // প্রথমে ফায়ারবেস অথেন্টিকেশন চেক
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                
                // ফায়ারস্টোর ডাটাবেজ ভেরিফিকেশন (ট্রাই-ক্যাচ সেফটি নেটসহ)
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        
                        // রোল অনুযায়ী রিডাইরেক্ট করা
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (userData.status === 'approved') {
                            window.location.href = 'customer.html';
                        } else {
                            alert("আপনার অ্যাকাউন্টটি এখনো অনুমোদিত হয়নি। অনুগ্রহ করে অ্যাডমিনের অনুমোদনের জন্য অপেক্ষা করুন।");
                        }
                    } else {
                        // ডাটাবেজে যদি ভুলবশত ইউজারের ডাটা ডিলিট বা মিসিং থাকে, তাও কাস্টমার পেজে পাঠিয়ে দেবে
                        console.log("ডাটাবেজে কোনো রেকর্ড মিলল না। ফলব্যাক রিডাইরেক্ট একটিভ।");
                        window.location.href = 'customer.html';
                    }
                } catch (firestoreErr) {
                    // ফায়ারস্টোর রিড পারমিশন বা অন্য কোনো এরর থাকলেও সরাসরি কাস্টমার পেজে নিয়ে যাবে
                    console.log("ফায়ারস্টোর এরর এড়ানো হয়েছে। রিডাইরেক্টিং...", firestoreErr.message);
                    window.location.href = 'customer.html';
                }

            } catch (err) { 
                alert("লগইন ভুল: " + err.message); 
            }
        });

        // ৩. পাসওয়ার্ড রিসেট লজিক
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reEmail').value.trim();
            try {
                await sendPasswordResetEmail(auth, email);
                alert("পাসওয়ার্ড রিসেট করার লিঙ্কটি আপনার ইমেইলে পাঠানো হয়েছে!");
                showSection('loginSection');
            } catch (err) { alert("রিসেট ব্যর্থ: " + err.message); }
        });
    </script>
</body>
</html>
