<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রবেশ ও নিবন্ধন পোর্টাল</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md transition-all duration-300">
        
        <!-- ট্যাব সিলেক্টর বাটনসমূহ -->
        <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
            <button id="loginTabBtn" onclick="switchTab('login')" class="w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 bg-white text-slate-800 shadow-sm">
                <i class="fa-solid fa-right-to-bracket mr-1"></i> লগইন
            </button>
            <button id="registerTabBtn" onclick="switchTab('register')" class="w-1/2 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800">
                <i class="fa-solid fa-user-plus mr-1"></i> রেজিষ্ট্রেশন
            </button>
        </div>

        <!-- ১. লগইন ফর্ম সেকশন -->
        <div id="loginSection" class="space-y-4">
            <div class="text-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">অ্যাকাউন্টে প্রবেশ করুন</h2>
                <p class="text-xs text-slate-400 mt-0.5">আপনার নিবন্ধিত তথ্য দিয়ে লগইন করুন</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ইমেইল ঠিকানা</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">পাসওয়ার্ড</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ড লিখুন" class="w-full px-4 pr-12 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                        <button type="button" onclick="togglePassword('loginPassword', 'loginEyeIcon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 focus:outline-none text-sm">
                            <i id="loginEyeIcon" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition shadow-md">
                    লগইন করুন
                </button>
            </form>
        </div>

        <!-- ২. রেজিষ্ট্রেশন ফর্ম সেকশন -->
        <div id="registerSection" class="space-y-4 hidden">
            <div class="text-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">নতুন সদস্য নিবন্ধন</h2>
                <p class="text-xs text-slate-400 mt-0.5">সঠিক তথ্য দিয়ে ফরমটি পূরণ করুন</p>
            </div>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">পূর্ণ নাম</label>
                    <input type="text" id="regName" placeholder="আপনার নাম লিখুন" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ইমেইল ঠিকানা</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">টাকা জমার মেয়াদ</label>
                    <select id="regDuration" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium text-slate-700 cursor-pointer" required>
                        <option value="" disabled selected>মেয়াদের বছর নির্বাচন করুন</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">পাসওয়ার্ড</label>
                    <div class="relative">
                        <input type="password" id="regPassword" placeholder="নূন্যতম ৬ অক্ষরের পাসওয়ার্ড" class="w-full px-4 pr-12 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                        <button type="button" onclick="togglePassword('regPassword', 'regEyeIcon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 focus:outline-none text-sm">
                            <i id="regEyeIcon" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="regBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition shadow-md">
                    আবেদন জমা দিন
                </button>
            </form>
        </div>

    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ================= PWA Service Worker Registration =================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // ১ থেকে ২০ বছর পর্যন্ত ড্রপডাউন তৈরি
        const durationSelect = document.getElementById('regDuration');
        for (let i = 1; i <= 20; i++) {
            const option = document.createElement('option');
            option.value = i;
            const banglaNumber = String(i).replace(/0/g,'০').replace(/1/g,'১').replace(/2/g,'২').replace(/3/g,'৩').replace(/4/g,'৪').replace(/5/g,'৫').replace(/6/g,'৬').replace(/7/g,'৭').replace(/8/g,'৮').replace(/9/g,'৯');
            option.innerText = `${banglaNumber} বছর (${i * 365} দিন)`;
            durationSelect.appendChild(option);
        }

        // ট্যাব স্যুইচিং লজিক
        window.switchTab = (tab) => {
            const loginSec = document.getElementById('loginSection');
            const regSec = document.getElementById('registerSection');
            const loginBtn = document.getElementById('loginTabBtn');
            const regBtn = document.getElementById('registerTabBtn');

            if (tab === 'login') {
                loginSec.classList.remove('hidden');
                regSec.classList.add('hidden');
                loginBtn.className = "w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 bg-white text-slate-800 shadow-sm";
                regBtn.className = "w-1/2 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800";
            } else {
                loginSec.classList.add('hidden');
                regSec.classList.remove('hidden');
                loginBtn.className = "w-1/2 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800";
                regBtn.className = "w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 bg-white text-slate-800 shadow-sm";
            }
        };

        // পাসওয়ার্ড শো/হাইড মেকানিজম
        window.togglePassword = (inputId, iconId) => {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        };

        // ================= লগইন লজিক হ্যান্ডলার =================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "লগইন হচ্ছে...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    if (userData.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (userData.status === 'approved') {
                        window.location.href = 'customer-dashboard.html';
                    } else {
                        await signOut(auth);
                        alert("আপনার অ্যাকাউন্টটি এখনও অনুমোদন করা হয়নি। অনুগ্রহ করে অ্যাডমিনের অনুমোদনের অপেক্ষা করুন।");
                        btn.disabled = false;
                        btn.innerText = "লগইন করুন";
                    }
                } else {
                    await signOut(auth);
                    alert("ডাটাবেজে আপনার কোনো তথ্য পাওয়া যায়নি।");
                    btn.disabled = false;
                    btn.innerText = "লগইন করুন";
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "লগইন করুন";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    alert("ভুল ইমেইল অথবা পাসওয়ার্ড দিয়েছেন। আবার চেষ্টা করুন।");
                } else {
                    alert("লগইন ব্যর্থ: " + error.message);
                }
            }
        });

        // ================= রেজিষ্ট্রেশন লজিক হ্যান্ডলার =================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const durationYears = parseInt(document.getElementById('regDuration').value);
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('regBtn');

            if (password.length < 6) {
                alert("পাসওয়ার্ড অবশ্যই নূন্যতম ৬ অক্ষরের হতে হবে।");
                return;
            }

            btn.disabled = true;
            btn.innerText = "প্রসেসিং হচ্ছে...";

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    role: "customer",
                    status: "pending", 
                    durationYears: durationYears, 
                    totalDeposit: 0,
                    totalProfitShare: 0,
                    createdAt: new Date()
                });

                alert("আপনার নিবন্ধন সফল হয়েছে! অ্যাডমিনের অনুমোদনের পর আপনি লগইন করতে পারবেন।");
                await signOut(auth);
                
                document.getElementById('registerForm').reset();
                switchTab('login');
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("এই ইমেইল ঠিকানাটি দিয়ে ইতিপূর্বে অ্যাকাউন্ট তৈরি করা হয়েছে।");
                } else {
                    alert("রেজিষ্ট্রেশন ব্যর্থ হয়েছে: " + error.message);
                }
            } finally {
                btn.disabled = false;
                btn.innerText = "আবেদন জমা দিন";
            }
        });
    </script>
</body>
    </html>
