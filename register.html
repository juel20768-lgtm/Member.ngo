<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য রেজিষ্ট্রেশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">নতুন সদস্য নিবন্ধন</h2>
            <p class="text-sm text-slate-400 mt-1">সঠিক তথ্য দিয়ে ফরমটি পূরণ করুন</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">পূর্ণ নাম</label>
                <input type="text" id="regName" placeholder="আপনার নাম লিখুন" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">ইমেইল ঠিকানা</label>
                <input type="email" id="regEmail" placeholder="example@mail.com" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">টাকা জমার মেয়াদ (Account Duration)</label>
                <select id="regDuration" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium text-slate-700 cursor-pointer" required>
                    <option value="" disabled selected>মেয়াদের বছর নির্বাচন করুন</option>
                    </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">পাসওয়ার্ড</label>
                <div class="relative">
                    <input type="password" id="regPassword" placeholder="নূন্যতম ৬ অক্ষরের পাসওয়ার্ড" class="w-full px-4 pr-12 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" required>
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 focus:outline-none text-sm">
                        <i id="passwordToggleIcon" class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="regBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition shadow-md">
                আবেদন জমা দিন
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="index.html" class="text-xs text-indigo-600 hover:underline">আগে থেকেই অ্যাকাউন্ট আছে? লগইন করুন</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ১ থেকে ২০ বছর পর্যন্ত ড্রপডাউন অপশন ডাইনামিকালি তৈরি করার লজিক
        const durationSelect = document.getElementById('regDuration');
        for (let i = 1; i <= 20; i++) {
            const option = document.createElement('option');
            option.value = i;
            
            // সংখ্যাগুলোকে বাংলায় দেখানোর জন্য কাস্টম কনভার্সন
            const banglaNumber = String(i).replace(/0/g, '০').replace(/1/g, '১').replace(/2/g, '২').replace(/3/g, '৩').replace(/4/g, '৪').replace(/5/g, '৫').replace(/6/g, '৬').replace(/7/g, '৭').replace(/8/g, '৮').replace(/9/g, '৯');
            
            option.innerText = `${banglaNumber} বছর (${i * 365} দিন)`;
            durationSelect.appendChild(option);
        }

        // পাসওয়ার্ড দেখানো এবং লুকানোর (Show/Hide) গ্লোবাল ফাংশন
        window.togglePasswordVisibility = () => {
            const passwordInput = document.getElementById('regPassword');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        };

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const durationYears = parseInt(document.getElementById('regDuration').value);
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('regBtn');

            if (password.length < 6) {
                alert("পাসওয়ার্ড অবশ্যই নূন্যতম ৬ অক্ষরের হতে হবে।");
                return;
            }

            btn.disabled = true;
            btn.innerText = "প্রসেসিং হচ্ছে...";

            try {
                // ১. ফায়ারবেস অথেনটিকেশনে ইউজার তৈরি
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // ২. ফায়ারস্টোর ডাটাবেজে স্ট্যাটাস পেন্ডিং ও মেয়াদ সহ ডাটা সেভ
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    role: "customer",
                    status: "pending", 
                    durationYears: durationYears, 
                    totalDeposit: 0,
                    totalProfitShare: 0,
                    createdAt: new Date() 
                });

                alert("আপনার নিবন্ধন সফল হয়েছে! অ্যাডমিনের অনুমোদনের পর আপনি লগইন করতে পারবেন।");
                
                await signOut(auth);
                window.location.href = 'index.html';

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "আবেদন জমা দিন";
                
                if (error.code === 'auth/email-already-in-use') {
                    alert("এই ইমেইল ঠিকানাটি দিয়ে ইতিপূর্বে অ্যাকাউন্ট তৈরি করা হয়েছে।");
                } else if (error.code === 'auth/invalid-email') {
                    alert("অনুগ্রহ করে একটি সঠিক ইমেইল ঠিকানা দিন।");
                } else {
                    alert("রেজিষ্ট্রেশন ব্যর্থ হয়েছে: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
